<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>weather App</title>
    <link rel="stylesheet" href="./CSS/style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Weather App</h1>

      <form id="form">
        <input type="text" id="search" placeholder="Enter city..." />
        <button type="submit" id="btn">Search</button>
      </form>

      <div id="weather">
        <h2 id="city"></h2>
        <p id="temp"></p>
        <p id="desc"></p>
      </div>
    </div>

    <script src="./JS/script.js"></script>
  </body>
</html>
